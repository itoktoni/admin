<!-- Form Page -->
<div class="space-y-3">

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 gap-3">
      <h3 class="card-title text-sm">Text Inputs</h3>
      <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12 md:col-span-6">
          <label class="label-text text-xs">Text</label>
          <input type="text" class="input input-sm w-full" placeholder="Enter text">
        </div>
        <div class="col-span-12 md:col-span-6">
          <label class="label-text text-xs">Email</label>
          <input type="email" class="input input-sm w-full" placeholder="email@example.com">
        </div>
        <div class="col-span-12 md:col-span-6">
          <label class="label-text text-xs">Password</label>
          <input type="password" class="input input-sm w-full" placeholder="••••••">
        </div>
        <div class="col-span-12 md:col-span-6">
          <label class="label-text text-xs">Number</label>
          <input type="number" class="input input-sm w-full" placeholder="0">
        </div>
        <div class="col-span-12">
          <label class="label-text text-xs">Textarea</label>
          <textarea class="textarea textarea-sm w-full" rows="2" placeholder="Message..."></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 gap-3">
      <h3 class="card-title text-sm">Input Groups</h3>
      <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12 md:col-span-6 join w-full">
          <span class="join-item btn btn-sm no-animation">@</span>
          <input class="input input-sm join-item flex-1" placeholder="username">
        </div>
        <div class="col-span-12 md:col-span-6 join w-full">
          <input class="input input-sm join-item flex-1" placeholder="Search">
          <button class="btn btn-sm btn-primary join-item">Go</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 gap-3">
      <h3 class="card-title text-sm">Select & Checkbox</h3>
      <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12 md:col-span-6">
          <label class="label-text text-xs">Select</label>
          <select class="select select-sm w-full">
            <option disabled selected>Choose</option>
            <option>Option 1</option>
            <option>Option 2</option>
          </select>
        </div>
        <div class="col-span-12 md:col-span-6 space-y-1">
          <label class="label-text text-xs">Checkbox</label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm checkbox-primary" checked>
            <span class="text-xs">Email notifications</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="switch switch-sm switch-primary">
            <span class="text-xs">Dark mode</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 gap-3">
      <h3 class="card-title text-sm">Buttons</h3>
      <div class="flex flex-wrap gap-1.5">
        <button class="btn btn-sm btn-primary">Primary</button>
        <button class="btn btn-sm btn-secondary">Secondary</button>
        <button class="btn btn-sm btn-success">Success</button>
        <button class="btn btn-sm btn-error">Error</button>
        <button class="btn btn-sm btn-outline">Outline</button>
        <button class="btn btn-sm btn-soft btn-info">Soft</button>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 gap-3">
      <h3 class="card-title text-sm">Alerts</h3>
      <div class="space-y-2">
        <div class="alert alert-info text-xs py-2"><span>Info message.</span></div>
        <div class="alert alert-success text-xs py-2"><span>Success!</span></div>
        <div class="alert alert-warning text-xs py-2"><span>Warning!</span></div>
        <div class="alert alert-error text-xs py-2"><span>Error!</span></div>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4 gap-3">
      <h3 class="card-title text-sm">Toast & Drawer</h3>
      <div class="flex gap-2">
        <button class="btn btn-sm btn-primary" @click="$store.app.showToast('Action completed!','alert-success')">Show
          Toast</button>
        <button class="btn btn-sm btn-outline" @click="$store.app.openDrawer()">Open Drawer</button>
      </div>
    </div>
  </div>



</div>
