<!DOCTYPE html>
<html lang="id" data-theme="shadcn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyonAdmin</title>
  <link href="dist/output.css" rel="stylesheet">
  <script src="layout.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>

<body class="bg-base-200 min-h-screen text-sm" x-data="router">

<div data-include="templates/sidebar.html"></div>
<div data-include="templates/header.html"></div>

<main class="lg:ml-56 pt-11 lg:pt-0 " @click="if(window.innerWidth<1024) $store.app.closeSidebar()">
  <div class="p-2 lg:p-3 space-y-3">
    <h2 class="text-lg font-bold" x-text="$store.app.pageTitle" x-effect="document.title=$store.app.pageTitle+' - FlyonAdmin'"></h2>
    <div id="page"></div>
  </div>
</main>

<div data-include="templates/footer.html"></div>

</body>
</html>
